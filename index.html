<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#060608">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="How much fun?">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.png">
<title>How much fun?</title>
<style>
  :root{
    --bg:#060608;
    --surface:#131318;
    --surface-2:#1B1B22;
    --border:#26262E;
    --text:#F4F4F6;
    --text-dim:#9C9CAB;
    --text-mute:#5F5F6E;
    --accent:#FF2E9A; /* wird per JS gesetzt */
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  html{background:var(--bg)}   /* deckt Safe-Area unten im Homescreen-Modus ab */
  body{
    min-height:100dvh;
    background:var(--bg);
    background-image:
      radial-gradient(60vmax 60vmax at 85% -10%, rgba(180,77,255,.10), transparent 60%),
      radial-gradient(55vmax 55vmax at -10% 105%, rgba(46,168,255,.08), transparent 60%);
    background-attachment:fixed;
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    overscroll-behavior:none;
    -webkit-user-select:none;user-select:none;
    touch-action:manipulation;
  }
  .app{
    max-width:430px;margin:0 auto;min-height:100%;
    padding:calc(18px + env(safe-area-inset-top)) 22px calc(20px + env(safe-area-inset-bottom));
    display:flex;flex-direction:column;
  }

  /* ---------- Kopf ---------- */
  .head-row{
    display:flex;align-items:baseline;justify-content:space-between;
    margin-bottom:10px;
  }
  .kicker{
    font-size:11px;font-weight:700;letter-spacing:.28em;text-transform:uppercase;
    color:var(--text-mute);
  }
  h1.title{
    font-size:clamp(28px, 8.5vw, 34px);font-weight:800;line-height:1.05;letter-spacing:-.02em;
    background:linear-gradient(95deg,#fff 5%, var(--accent) 45%, #fff 85%);
    background-size:220% 100%;
    -webkit-background-clip:text;background-clip:text;
    color:transparent;
    animation:sheen 5s linear infinite;
    margin-bottom:16px;
  }
  body.rainbow h1.title{
    background-image:linear-gradient(95deg,#FF5E5E,#FFC64D,#D4FF3F,#2EA8FF,#B44DFF,#FF2E9A,#FF5E5E);
  }
  @keyframes sheen{to{background-position:220% 0}}

  /* ---------- Sections ---------- */
  .label{
    font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
    color:var(--text-mute);margin:0 0 8px;
  }

  /* ---------- Spaß-Slider ---------- */
  .fun-row{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px}
  .fun-value{font-size:13px;font-weight:700;color:var(--text);letter-spacing:.04em;font-variant-numeric:tabular-nums}
  input[type=range].fun{
    -webkit-appearance:none;appearance:none;width:100%;height:36px;
    background:transparent;margin-bottom:16px;cursor:pointer;
  }
  input[type=range].fun::-webkit-slider-runnable-track{
    height:6px;border-radius:99px;border:1px solid var(--border);
    background:
      linear-gradient(var(--surface-2),var(--surface-2)) no-repeat right / calc(100% - var(--fill,50%)) 100%,
      linear-gradient(90deg, color-mix(in srgb, var(--accent) 35%, #1B1B22), var(--accent));
  }
  input[type=range].fun::-webkit-slider-thumb{
    -webkit-appearance:none;width:26px;height:26px;border-radius:50%;border:none;
    background:var(--accent);margin-top:-11px;
    box-shadow:0 0 16px color-mix(in srgb, var(--accent) 70%, transparent), inset 0 0 0 2px rgba(0,0,0,.25);
  }
  body.rainbow input[type=range].fun::-webkit-slider-runnable-track{
    background:
      linear-gradient(var(--surface-2),var(--surface-2)) no-repeat right / calc(100% - var(--fill,50%)) 100%,
      linear-gradient(90deg,#FF5E5E,#FFC64D,#D4FF3F,#2EA8FF,#B44DFF,#FF2E9A);
  }
  body.rainbow input[type=range].fun::-webkit-slider-thumb{
    background:#fff;
    box-shadow:0 0 16px rgba(255,255,255,.65), inset 0 0 0 2px rgba(0,0,0,.15);
  }

  /* ---------- Personen-Chips (rund, eine Reihe) ---------- */
  .people-grid{display:flex;justify-content:space-between;margin-bottom:18px}
  .people-grid button{
    width:36px;height:36px;border-radius:50%;cursor:pointer;
    background:var(--surface);border:1px solid var(--border);color:var(--text-dim);
    font-size:15px;font-weight:700;font-variant-numeric:tabular-nums;
    transition:transform .12s ease, border-color .15s, color .15s, box-shadow .2s;
  }
  .people-grid button:active{transform:scale(.94)}
  .people-grid button.active{
    color:var(--text);border-color:var(--accent);
    background:color-mix(in srgb, var(--accent) 10%, var(--surface));
    box-shadow:0 0 18px color-mix(in srgb, var(--accent) 40%, transparent);
  }
  body.rainbow .people-grid button.active{
    border-color:transparent;
    background:
      linear-gradient(var(--surface-2),var(--surface-2)) padding-box,
      linear-gradient(120deg,#FF5E5E,#FFC64D,#D4FF3F,#2EA8FF,#B44DFF,#FF2E9A) border-box;
    border:2px solid transparent;
    box-shadow:0 0 20px rgba(180,77,255,.35);
  }

  /* ---------- Farb-Chips ---------- */
  .color-row{display:flex;justify-content:space-between;margin-bottom:18px}
  .color-chip{
    width:36px;height:36px;border-radius:50%;cursor:pointer;border:none;
    transition:transform .12s ease, box-shadow .2s;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);
  }
  .color-chip:active{transform:scale(.9)}
  .color-chip.rainbow{
    background:conic-gradient(from 210deg,#FF5E5E,#FFC64D,#D4FF3F,#2EA8FF,#B44DFF,#FF2E9A,#FF5E5E);
  }
  .color-chip.active{
    box-shadow:
      0 0 0 2.5px var(--bg),
      0 0 0 4.5px var(--chip, #fff),
      0 0 18px var(--chip, rgba(255,255,255,.6));
    transform:scale(1.06);
  }
  .color-chip.custom{
    background:
      linear-gradient(var(--surface-2),var(--surface-2)) padding-box,
      conic-gradient(from 210deg,#FF5E5E,#FFC64D,#D4FF3F,#2EA8FF,#B44DFF,#FF2E9A,#FF5E5E) border-box;
    border:2px solid transparent;
    display:grid;place-items:center;font-size:15px;line-height:1;
    position:relative;overflow:hidden;
  }
  /* nativer Color-Input transparent über dem Chip → öffnet den Picker per echtem Tap (iOS) */
  .custom-input{
    position:absolute;inset:0;width:100%;height:100%;
    opacity:0;border:none;padding:0;margin:0;cursor:pointer;
  }
  .custom-emoji{pointer-events:none}
  .color-chip.custom.picked .custom-emoji{opacity:0}

  /* ---------- Pills (Stil / Ambiente) ---------- */
  .pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
  .pill{
    background:var(--surface);border:1px solid var(--border);color:var(--text-dim);
    border-radius:999px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;
    transition:border-color .15s, color .15s, box-shadow .2s;
  }
  .pill:active{transform:scale(.96)}
  .pill.active{
    color:var(--text);border-color:var(--accent);
    background:color-mix(in srgb, var(--accent) 10%, var(--surface));
    box-shadow:0 0 14px color-mix(in srgb, var(--accent) 35%, transparent);
  }

  /* ---------- Extras: Switch-Karten ---------- */
  .switch-row{display:flex;gap:8px;margin-bottom:16px}
  .switch-card{
    flex:1;display:flex;flex-direction:column;align-items:center;gap:8px;
    background:var(--surface);border:1px solid var(--border);border-radius:18px;
    padding:10px 6px;cursor:pointer;color:var(--text-dim);
    font-size:11.5px;font-weight:600;
    transition:border-color .15s, color .15s;
  }
  .switch-card:active{transform:scale(.97)}
  .sc-switch{
    width:40px;height:24px;border-radius:99px;position:relative;
    background:var(--surface-2);border:1px solid var(--border);
    transition:background .2s, border-color .2s;
  }
  .sc-switch::after{
    content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;
    background:var(--text-mute);transition:transform .2s, background .2s;
  }
  .switch-card.on{color:var(--text);border-color:color-mix(in srgb, var(--accent) 45%, var(--border))}
  .switch-card.on .sc-switch{background:var(--accent);border-color:var(--accent)}
  .switch-card.on .sc-switch::after{transform:translateX(16px);background:#fff}

  /* ---------- Runden-Status (im Kopf) ---------- */
  .rounds{
    display:flex;gap:8px;align-items:baseline;
    font-size:12px;color:var(--text-mute);
  }
  .rounds strong{color:var(--text-dim);font-weight:700}
  .rounds button{
    background:none;border:none;color:var(--text-mute);font-size:14px;
    cursor:pointer;padding:0;line-height:1;
  }

  /* ---------- Go-Button ---------- */
  .go-wrap{margin-top:auto;padding-top:8px}
  .go-btn{
    width:100%;border:none;border-radius:999px;padding:20px;cursor:pointer;
    font-size:18px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;
    color:#0B0B0F;background:var(--accent);
    box-shadow:0 0 26px color-mix(in srgb, var(--accent) 50%, transparent),
               0 0 70px color-mix(in srgb, var(--accent) 22%, transparent);
    animation:pulse 2.2s ease-in-out infinite;
    transition:transform .12s ease;
  }
  .go-btn:active{transform:scale(.97)}
  @keyframes pulse{
    0%,100%{box-shadow:0 0 26px color-mix(in srgb, var(--accent) 50%, transparent),0 0 70px color-mix(in srgb, var(--accent) 22%, transparent)}
    50%{box-shadow:0 0 40px color-mix(in srgb, var(--accent) 80%, transparent),0 0 100px color-mix(in srgb, var(--accent) 35%, transparent)}
  }
  body.rainbow .go-btn{
    background:linear-gradient(100deg,#FF5E5E,#FFC64D,#D4FF3F,#2EA8FF,#B44DFF,#FF2E9A,#FF5E5E);
    background-size:300% 100%;
    animation:pulse-rb 2.2s ease-in-out infinite, flow 6s linear infinite;
  }
  @keyframes flow{to{background-position:300% 0}}
  @keyframes pulse-rb{
    0%,100%{box-shadow:0 0 26px rgba(255,46,154,.4),0 0 70px rgba(46,168,255,.25)}
    50%{box-shadow:0 0 42px rgba(255,46,154,.65),0 0 110px rgba(46,168,255,.4)}
  }

  /* ---------- Line-Overlay ---------- */
  .overlay{
    position:fixed;inset:0;background:#000;z-index:100;display:none;
    touch-action:none;overflow:hidden;
  }
  .overlay.open{display:block}
  .overlay canvas{position:absolute;inset:0;width:100%;height:100%}
  .count{position:absolute;inset:0;display:grid;place-items:center;pointer-events:none}
  .count span{
    font-size:120px;font-weight:800;color:#fff;opacity:0;
    font-variant-numeric:tabular-nums;
    text-shadow:0 0 46px color-mix(in srgb, var(--accent) 65%, transparent);
  }
  .count span.tick{animation:countPop .6s ease-out}
  @keyframes countPop{
    0%{opacity:0;transform:scale(1.6)}
    25%{opacity:1;transform:scale(1)}
    80%{opacity:1;transform:scale(1)}
    100%{opacity:0;transform:scale(.9)}
  }
  .hint{
    position:absolute;left:0;right:0;bottom:calc(20px + env(safe-area-inset-bottom));
    text-align:center;pointer-events:none;
    font-size:11px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
    color:rgba(255,255,255,.35);
    opacity:0;transition:opacity .9s ease;
  }
  .spruch{
    position:absolute;left:24px;right:24px;bottom:calc(52px + env(safe-area-inset-bottom));
    text-align:center;pointer-events:none;
    font-size:15px;font-weight:700;letter-spacing:.06em;color:rgba(255,255,255,.88);
    text-shadow:0 0 18px rgba(255,255,255,.35);
    opacity:0;transition:opacity .9s ease;
  }
  .spruch.show{opacity:1}
  .spruch.big{
    top:50%;bottom:auto;transform:translateY(-50%);
    font-size:22px;letter-spacing:.04em;transition:none;
  }
  .spruch.big.show{animation:spruchPop .5s cubic-bezier(.2,1.4,.4,1) both}
  @keyframes spruchPop{
    from{opacity:0;transform:translateY(-50%) scale(.6)}
    to{opacity:1;transform:translateY(-50%) scale(1)}
  }
  .tool{
    /* Breite + Rotation werden je Werkzeug per JS gesetzt */
    position:absolute;left:50%;
    display:none;pointer-events:none;z-index:6;
    filter:drop-shadow(0 0 30px rgba(255,220,120,.30));
  }
  .tool.show{display:block}
  /* Gartenzwerg-Helfer: kommt von oben, Strohhalm zieht die Line weg */
  .gnome{
    /* groß, damit der (dünne) Strohhalm die Line-Breite verdeckt */
    position:absolute;left:50%;width:220vw;
    transform:translateX(-50%);
    display:none;pointer-events:none;z-index:6;
    filter:drop-shadow(0 0 22px rgba(0,0,0,.45));
  }
  .gnome.show{display:block}
  .help-btn{
    position:absolute;left:50%;transform:translateX(-50%);
    bottom:calc(70px + env(safe-area-inset-bottom));
    padding:14px 26px;border:none;border-radius:999px;cursor:pointer;
    font-size:14px;font-weight:800;letter-spacing:.06em;
    color:#0B1418;background:linear-gradient(100deg,#7FE7C4,#57C8FF);
    box-shadow:0 0 22px rgba(87,200,255,.5);
    display:none;
    animation:pulse-help 2s ease-in-out infinite;
  }
  .help-btn.show{display:block}
  .help-btn:active{transform:translateX(-50%) scale(.96)}
  @keyframes pulse-help{
    0%,100%{box-shadow:0 0 20px rgba(87,200,255,.45)}
    50%{box-shadow:0 0 38px rgba(87,200,255,.78)}
  }
  .gold-btn{
    position:absolute;left:50%;transform:translateX(-50%);
    bottom:calc(70px + env(safe-area-inset-bottom));
    padding:14px 28px;border:none;border-radius:999px;cursor:pointer;
    font-size:14px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;
    color:#1A1200;background:linear-gradient(100deg,#FFC64D,#FFE9A8,#FFC64D);
    box-shadow:0 0 24px rgba(255,198,77,.5), 0 0 60px rgba(255,198,77,.25);
    display:none;
    animation:pulse-gold 2s ease-in-out infinite;
  }
  .gold-btn.show{display:block}
  .gold-btn:active{transform:translateX(-50%) scale(.96)}
  @keyframes pulse-gold{
    0%,100%{box-shadow:0 0 22px rgba(255,198,77,.45), 0 0 60px rgba(255,198,77,.2)}
    50%{box-shadow:0 0 40px rgba(255,198,77,.75), 0 0 90px rgba(255,198,77,.35)}
  }
  .overlay.done .hint{opacity:1}
  .overlay.done .hint.fade{opacity:0}
</style>
</head>
<body>

<!-- ============ Setup ============ -->
<div class="app" id="setupView">
  <div class="head-row">
    <div class="kicker">⚡ Energy Sniff</div>
    <div class="rounds" id="roundsLine"></div>
  </div>
  <h1 class="title">How much fun?</h1>

  <div class="fun-row">
    <div class="label" style="margin:0">Wie viel Spaß?</div>
    <div class="fun-value" id="funValue"></div>
  </div>
  <input type="range" class="fun" id="funSlider" min="1" max="10" step="1" aria-label="Wie viel Spaß?">

  <div class="label">Wie viele seid ihr?</div>
  <div class="people-grid" id="peopleGrid"></div>

  <div class="label">Schimmer</div>
  <div class="color-row" id="colorRow"></div>

  <div class="label">Stil</div>
  <div class="pill-row" id="styleRow"></div>

  <div class="label">Ambiente</div>
  <div class="pill-row" id="bgRow"></div>

  <div class="label">Werkzeug</div>
  <div class="pill-row" id="toolRow"></div>

  <div class="label">Extras</div>
  <div class="switch-row" id="toggleRow"></div>

  <div class="go-wrap">
    <button class="go-btn" id="goBtn">⚡ Let's go</button>
  </div>
</div>

<!-- ============ Overlay ============ -->
<div class="overlay" id="overlay">
  <canvas id="cv"></canvas>
  <div class="count"><span id="countNum"></span></div>
  <img class="tool" id="toolImg" alt="">
  <img class="gnome" id="gnomeImg" src="gnome.png" alt="">
  <div class="spruch" id="spruchEl"></div>
  <button class="gold-btn" id="goldBtn">🏆 Goldene Line ziehen</button>
  <button class="help-btn" id="helpBtn">🧙 Brauchst du Hilfe?</button>
  <div class="hint" id="swipeHint">Zum Beenden nach oben schieben</div>
</div>

<script>
'use strict';
/* ================= Settings ================= */
const LS_KEY = 'hmf_settings';

const COLORS = [
  { id:'rainbow', name:'Regenbogen' },
  { id:'pink',   hex:'#FF2E9A', name:'Neon-Pink' },
  { id:'blue',   hex:'#2EA8FF', name:'Electric Blue' },
  { id:'acid',   hex:'#D4FF3F', name:'Acid Green' },
  { id:'gold',   hex:'#FFC64D', name:'Gold' },
  { id:'violet', hex:'#B44DFF', name:'Violett' },
];

function load(){
  try{ const v = JSON.parse(localStorage.getItem(LS_KEY)); return v ?? {}; }
  catch{ return {}; }
}
const STYLES = [
  { id:'classic', name:'Classic' },
  { id:'glitzer', name:'✨ Extra Glitzer' },
  { id:'doppel',  name:'Doppel-Line' },
];
const BGS = [
  { id:'none',   name:'Schwarz' },
  { id:'sterne', name:'✦ Sterne' },
  { id:'nebel',  name:'Nebel' },
];
// Werkzeug zum Wegwischen der Lines. elemVW so gewählt, dass die
// „schiebende" Kante ~92vw breit ist (so breit wie die Schaufelklinge).
// rotate: Grafik so drehen, dass die Kante oben (nach oben schiebend) ist.
// leadFrac: Anteil der Element-Höhe vom oberen Rand bis zur Vorderkante.
const TOOLS = [
  { id:'schieber',    name:'❄️ Schieber',    src:'shovel.png', elemVW:158, rotate:180, leadFrac:0.045 },
  { id:'staubsauger', name:'🌀 Staubsauger', src:'vacuum.png', elemVW:286, rotate:0,   leadFrac:0.044 },
];

const saved = load();
let people = Math.min(8, Math.max(1, saved.people ?? 2));
let colorId = saved.color === 'custom' || COLORS.some(c => c.id === saved.color) ? saved.color : 'rainbow';
let fun = Math.min(10, Math.max(1, saved.fun ?? 6));
let soundOn   = saved.sound ?? true;
let musicSync = saved.music ?? false;
let goldOn    = saved.gold  ?? false;
let styleId   = STYLES.some(s => s.id === saved.style) ? saved.style : 'classic';
let bgId      = BGS.some(b => b.id === saved.bg) ? saved.bg : 'none';
let toolId    = TOOLS.some(t => t.id === saved.tool) ? saved.tool : 'schieber';
let customHex = /^#[0-9a-fA-F]{6}$/.test(saved.customHex || '') ? saved.customHex : '#00E5FF';

function persist(){
  localStorage.setItem(LS_KEY, JSON.stringify({
    people, color: colorId, fun,
    sound: soundOn, music: musicSync, gold: goldOn,
    style: styleId, bg: bgId, tool: toolId, customHex,
  }));
}
function currentTool(){ return TOOLS.find(t => t.id === toolId) || TOOLS[0]; }
function currentColor(){
  if (colorId === 'custom') return { id:'custom', hex: customHex, name:'Eigene Farbe' };
  return COLORS.find(c => c.id === colorId);
}

/* ================= Setup-UI ================= */
const peopleGrid = document.getElementById('peopleGrid');
for (let n = 1; n <= 8; n++){
  const b = document.createElement('button');
  b.textContent = n;
  b.dataset.n = n;
  b.addEventListener('click', () => {
    people = n; persist(); renderSetup();
    if (navigator.vibrate) navigator.vibrate(15);
  });
  peopleGrid.appendChild(b);
}

const colorRow = document.getElementById('colorRow');
for (const c of COLORS){
  const b = document.createElement('button');
  b.className = 'color-chip' + (c.id === 'rainbow' ? ' rainbow' : '');
  b.dataset.id = c.id;
  b.setAttribute('aria-label', c.name);
  if (c.hex){ b.style.background = c.hex; b.style.setProperty('--chip', c.hex); }
  else b.style.setProperty('--chip', '#fff');
  b.addEventListener('click', () => {
    colorId = c.id; persist(); renderSetup();
    if (navigator.vibrate) navigator.vibrate(15);
  });
  colorRow.appendChild(b);
}

// Eigene Farbe: <label> mit echtem, transparent überlagertem <input type=color>.
// Tap trifft den Input direkt → nativer Picker öffnet (auch auf iOS).
const customChip  = document.createElement('label');
customChip.className = 'color-chip custom';
customChip.dataset.id = 'custom';
customChip.setAttribute('aria-label', 'Eigene Farbe');
const customEmoji = document.createElement('span');
customEmoji.className = 'custom-emoji';
customEmoji.textContent = '🎨';
const customInput = document.createElement('input');
customInput.type = 'color';
customInput.className = 'custom-input';
customInput.value = customHex;
customChip.append(customEmoji, customInput);
customInput.addEventListener('input', () => {
  customHex = customInput.value; colorId = 'custom';
  persist(); renderSetup();
  if (navigator.vibrate) navigator.vibrate(15);
});
colorRow.appendChild(customChip);

// Stil- und Ambiente-Pills
function buildPills(rowId, items, onPick){
  const row = document.getElementById(rowId);
  for (const it of items){
    const b = document.createElement('button');
    b.className = 'pill';
    b.dataset.id = it.id;
    b.textContent = it.name;
    b.addEventListener('click', () => {
      onPick(it.id); persist(); renderSetup();
      if (navigator.vibrate) navigator.vibrate(15);
    });
    row.appendChild(b);
  }
}
buildPills('styleRow', STYLES, id => { styleId = id; });
buildPills('bgRow',    BGS,    id => { bgId = id; });
buildPills('toolRow',  TOOLS,  id => { toolId = id; });

// Extras-Toggles
const TOGGLES = [

/* ================= Sound (WebAudio, synthetisiert) ================= */
let ac = null;
function audio(){
  if (!soundOn) return null;
  try{
    ac = ac || new (window.AudioContext || window.webkitAudioContext)();
    if (ac.state === 'suspended') ac.resume();
    return ac;
  }catch{ return null; }
}
function env(g, t0, attack, peak, decay){
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + attack);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + attack + decay);
}
function sTick(freq){
  const c = audio(); if (!c) return;
  const o = c.createOscillator(), g = c.createGain();
  o.type = 'square'; o.frequency.value = freq || 1200;
  env(g, c.currentTime, 0.005, 0.10, 0.09);
  o.connect(g).connect(c.destination);
  o.start(); o.stop(c.currentTime + 0.12);
}
function sRiser(ms){
  const c = audio(); if (!c) return;
  const t0 = c.currentTime, dur = ms / 1000;
  // weiches Noise-Whoosh: gefiltertes Rauschen, das nach oben zieht
  const len = Math.ceil(c.sampleRate * (dur + 0.3));
  const buf = c.createBuffer(1, len, c.sampleRate);
  const data = buf.getChannelData(0);
  for (let k = 0; k < len; k++) data[k] = Math.random() * 2 - 1;
  const src = c.createBufferSource(); src.buffer = buf;
  const f = c.createBiquadFilter();
  f.type = 'bandpass'; f.Q.value = 0.9;
  f.frequency.setValueAtTime(350, t0);
  f.frequency.exponentialRampToValueAtTime(3200, t0 + dur);
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(0.16, t0 + dur * 0.8);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur + 0.25);
  src.connect(f); f.connect(g); g.connect(c.destination);
  src.start(t0); src.stop(t0 + dur + 0.3);
}
function sPing(){
  const c = audio(); if (!c) return;
  const t0 = c.currentTime;
  for (const fp of [[880, 0.14], [1320, 0.08]]){
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'sine'; o.frequency.value = fp[0];
    env(g, t0, 0.01, fp[1], 0.9);
    o.connect(g).connect(c.destination);
    o.start(t0); o.stop(t0 + 1);
  }
}
function sFanfare(){
  const c = audio(); if (!c) return;
  [523.25, 659.25, 783.99].forEach((fq, i) => {   // C5 – E5 – G5
    const t0 = c.currentTime + i * 0.12;
    const o = c.createOscillator(), g = c.createGain();
    o.type = 'triangle'; o.frequency.value = fq;
    env(g, t0, 0.01, 0.13, i === 2 ? 0.8 : 0.25);
    o.connect(g).connect(c.destination);
    o.start(t0); o.stop(t0 + 1.2);
  });
}

/* ================= Musik-Sync (Mikrofon → Bass-Puls) ================= */
let mic = null, analyser = null, freqData = null, bassAvg = 0, bassPulse = 0, musicBoost = null;

function startMusicSync(){
  if (!musicSync || !navigator.mediaDevices?.getUserMedia) return;
  navigator.mediaDevices.getUserMedia({ audio: true }).then(stream => {
    if (!overlay.classList.contains('open')){ stream.getTracks().forEach(tr => tr.stop()); return; }
    mic = stream;
    const c = audio() || new (window.AudioContext || window.webkitAudioContext)();
    ac = c;
    const src = c.createMediaStreamSource(stream);
    analyser = c.createAnalyser();
    analyser.fftSize = 256;
    freqData = new Uint8Array(analyser.frequencyBinCount);
    src.connect(analyser);   // bewusst NICHT an destination → kein Feedback
  }).catch(() => {});        // keine Permission / kein Mikro → stiller Zeit-Puls-Fallback
}
function stopMusicSync(){
  if (mic) mic.getTracks().forEach(tr => tr.stop());
  mic = null; analyser = null; musicBoost = null; bassAvg = 0; bassPulse = 0;
}
function musicLevel(){
  analyser.getByteFrequencyData(freqData);
  let sum = 0;
  for (let k = 1; k < 9; k++) sum += freqData[k];   // untere Bins ≈ Bass
  const level = sum / (8 * 255);
  bassAvg = bassAvg * 0.97 + level * 0.03;          // rollender Grundpegel
  const rel = bassAvg > 0.02 ? level / bassAvg : 0;
  const target = rel > 1.08 ? Math.min(1, (rel - 1) * 2.2) : 0;
  // schneller Attack, langsamer Release → knackige Beats, weiches Ausklingen
  bassPulse += (target - bassPulse) * (target > bassPulse ? 0.5 : 0.12);
  return bassPulse;
}

function goldStyle(line, t){
  const g = ctx.createLinearGradient(line.ax, line.ay, line.bx, line.by);
  const sh = (Math.sin(t * 2) + 1) / 2;
  g.addColorStop(0, '#FFC64D');
  g.addColorStop(0.5, `hsl(${46 + sh * 8} 100% ${70 + sh * 8}%)`);
  g.addColorStop(1, '#FFC64D');
  return g;
}

function startRoulette(){
  gold = { idx: -1, winner: null };
  const n = lines.length;
  const jumps = 14 + (Math.random() * 6 | 0);
  let step = 0;
  function jump(){
    step++;
    let next;
    do { next = (Math.random() * n) | 0; } while (next === gold.idx && n > 1);
    gold.idx = next;
    sTick(1400);
    if (navigator.vibrate) navigator.vibrate(15);
    if (step < jumps){
      const delay = 90 + Math.pow(step / jumps, 2.2) * 420;   // dramatisch abbremsen
      countTimers.push(setTimeout(jump, delay));
    } else {
      gold.winner = gold.idx;
      sFanfare();
      if (navigator.vibrate) navigator.vibrate([80, 60, 200]);
      showSpruch('Die goldene Line! 🏆', 6000);
    }
  }
  countTimers.push(setTimeout(jump, 200));
}

const gnomeEl = document.getElementById('gnomeImg');
const GNOME_STRAW_TIP = 0.925;   // Anteil der Element-Höhe bis zur Strohhalm-Spitze
let helperMode = null;           // null | 'count' | 'descend'
let helperUsed = false, helperFinished = false, gnomeY = 0, gnomeH = 0, helpTimers = [];

function resetHelper(){
  helperMode = null; helperUsed = false; helperFinished = false; gnomeY = 0; gnomeH = 0;
  helpTimers.forEach(clearTimeout); helpTimers = [];
  gnomeEl.classList.remove('show');
  document.getElementById('helpBtn').classList.remove('show');
}

function startHelper(){
  if (helperMode) return;
  document.getElementById('helpBtn').classList.remove('show');
  helperUsed = true;
  helperMode = 'count';
  // Countdown 5 → 1, dann sinkt der Zwerg von oben herab
  const numEl = document.getElementById('countNum');
  helpTimers.forEach(clearTimeout); helpTimers = [];
  const STEP = 650;
  for (let k = 0; k < 5; k++){
    const num = 5 - k;
    helpTimers.push(setTimeout(() => {
      numEl.textContent = num;
      numEl.classList.remove('tick'); void numEl.offsetWidth; numEl.classList.add('tick');
      if (navigator.vibrate) navigator.vibrate(30);
      sTick(760 + num * 55);
    }, k * STEP));
  }
  helpTimers.push(setTimeout(() => {
    numEl.textContent = ''; numEl.classList.remove('tick');
    gnomeEl.classList.add('show');
    gnomeH = gnomeEl.offsetHeight || (gnomeEl.offsetWidth * 1147 / 640);
    gnomeY = -GNOME_STRAW_TIP * gnomeH - 20;   // Strohhalm-Spitze knapp über dem oberen Rand
    gnomeEl.style.top = gnomeY + 'px';
    helperMode = 'descend';
    if (navigator.vibrate) navigator.vibrate(50);
  }, 5 * STEP));
}

document.getElementById('helpBtn').addEventListener('click', e => { e.stopPropagation(); startHelper(); });

overlay.addEventListener('pointerdown', e => {
  if (wipeMode === 'complete' || helperMode) return;
  dragY0 = e.clientY;
  try{ overlay.setPointerCapture(e.pointerId); }catch{}
});
overlay.addEventListener('pointermove', e => {
  if (dragY0 === null || wipeMode === 'complete' || helperMode) return;
  if (wipeY === null && dragY0 - e.clientY < 12) return;   // erst ab kleinem Zug
  if (wipeMode !== 'drag'){ wipeMode = 'drag'; ensureToolMetrics(); }
  wipeY = Math.min(H, e.clientY);
  placeTool(wipeY);
});
overlay.addEventListener('pointerup', e => {
  if (dragY0 === null) return;
  const dy = dragY0 - e.clientY;
  dragY0 = null;
  if (wipeMode !== 'drag') return;
  if (wipeY < H * 0.45 || dy > H * 0.4){
    wipeMode = 'complete';                     // Schaufel fährt den Rest hoch
    if (navigator.vibrate) navigator.vibrate(40);
  } else {
    wipeMode = 'cancel';                       // zu kurz → Schaufel fährt zurück
  }
});
overlay.addEventListener('pointercancel', () => {
  dragY0 = null;
  if (wipeMode === 'drag') wipeMode = 'cancel';
});

function gauss(){
  return (Math.random() + Math.random() + Math.random() + Math.random() - 2) / 2;
}

// Vorgerenderte Powder-Körnchen: Radial-Verlauf mit versetztem Glanzpunkt → 3D-Look
const SPRITES = [];
(function makeSprites(){
  for (let v = 0; v < 3; v++){
    const s = document.createElement('canvas');
    s.width = s.height = 24;
    const c = s.getContext('2d');
    const r = 12, ang = v * 2.1;
    const hx = 12 + Math.cos(ang) * r * 0.28;
    const hy = 12 + Math.sin(ang) * r * 0.28 - r * 0.1;
    const g = c.createRadialGradient(hx, hy, r * 0.06, 12, 12, r);
    g.addColorStop(0,    'rgba(255,255,255,1)');
    g.addColorStop(0.3,  'rgba(255,255,255,.92)');
    g.addColorStop(0.65, 'rgba(232,232,240,.5)');
    g.addColorStop(1,    'rgba(215,215,228,0)');
    c.fillStyle = g;
    c.beginPath(); c.arc(12, 12, r, 0, Math.PI * 2); c.fill();
    SPRITES.push(s);
  }
})();

function sizeCanvas(){
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // Canvas-Filter-Support (Safari < 18 kann kein ctx.filter)
  ctx.filter = 'blur(2px)';
  filterOK = ctx.filter !== 'none';
  ctx.filter = 'none';
}

let stars = [];

function buildLines(){
  sizeCanvas();
  lines = [];
  const n = people;
  const vertical = n <= 4;   // 1–4 Lines hochkant, ab 5 quer

  // Sternenfeld fürs Ambiente vorberechnen
  stars = [];
  if (bgId === 'sterne'){
    for (let k = 0; k < 120; k++){
      stars.push({
        x: Math.random() * W, y: Math.random() * H,
        r: 0.4 + Math.random() * 0.9,
        a: 0.25 + Math.random() * 0.5,
        ph: Math.random() * Math.PI * 2,
      });
    }
  }

  // Spaß-Level 1–10 → Dicke: Glow-Breite, Streuung und Partikelgröße/-menge.
  // Doppel-Line = EINE doppelt so dicke Line (kein Nebeneinander).
  const isDouble   = styleId === 'doppel';
  const isGlitzer  = styleId === 'glitzer';
  const thickMul   = isDouble ? 1.9 : 1;
  const thick      = (0.65 + fun * 0.11) * thickMul;
  const spreadCore = (1.4  + fun * 0.5) * thickMul;  // Kern-Streuung (breiter bei Doppel)
  const sizeF      = (0.85 + fun * 0.05) * (isDouble ? 1.15 : 1);

  for (let i = 0; i < n; i++){
    // Länge: Stufe 1 bleibt kurz (113 px), Stufe 10 ≈ 6,5 echte cm.
    // 1 echter cm ≈ 60 CSS-px auf iPhones (96/2.54 wären Desktop-CSS-cm — zu klein).
    const LEN_MIN = 113;
    const PX_CM   = 60;
    const LEN_MAX = Math.min((vertical ? H : W) * 0.92, 6.5 * PX_CM);
    const len     = LEN_MIN + (LEN_MAX - LEN_MIN) * (fun - 1) / 9;

    let ax, ay, bx, by;
    if (vertical){
      // mittig, gleichmäßig über die Breite verteilt
      const x = W / (n + 1) * (i + 1);
      ax = x; bx = x; ay = (H - len) / 2; by = ay + len;
    } else {
      // mittig, gleichmäßig über die Höhe verteilt
      const spacing = H / (n + 1);
      const y = spacing * (i + 1);
      ax = (W - len) / 2; bx = ax + len; ay = y; by = y;
    }

    // feinere, dichtere Körnchen (bei vielen Linien etwas reduziert für Performance)
    const perLine = Math.round(Math.min(2400, Math.max(600, len * 4.2 * sizeF))
      * (n > 4 ? 0.75 : 1) * (isGlitzer ? 1.4 : 1) * (isDouble ? 1.5 : 1));

    const particles = [];
    for (let p = 0; p < perLine; p++){
      const u = p / perLine;
      const taper = prof(u);   // Mitte dicker, Enden schmal
      const spread = (Math.random() < 0.88 ? spreadCore : spreadCore * 3) * taper;
      const along = gauss() * 1.5;
      const ortho = gauss() * spread;
      particles.push({
        u,
        x: ax + (bx - ax) * u + (vertical ? ortho : along),
        y: ay + (by - ay) * u + (vertical ? along : ortho),
        r: (0.35 + Math.random() * 0.95) * sizeF * (0.72 + 0.28 * taper),
        a: 0.35 + Math.random() * 0.65,
        tw: isGlitzer && Math.random() < 0.18 ? Math.random() * Math.PI * 2 : null,
        sprite: SPRITES[(Math.random() * SPRITES.length) | 0],
      });
    }
    lines.push({ ax, ay, bx, by, thick, vertical, isGlitzer, particles });
  }
}

function linePath(line, eased, off){
  const ox = line.vertical ? (off || 0) : 0;
  const oy = line.vertical ? 0 : (off || 0);
  ctx.beginPath();
  ctx.moveTo(line.ax + ox, line.ay + oy);
  ctx.lineTo(line.ax + ox + (line.bx - line.ax) * eased, line.ay + oy + (line.by - line.ay) * eased);
}

// Breiten-Profil: Enden schmal, Mitte leicht dicker (wie eine echte Line)
function prof(u){ return 0.55 + 0.75 * Math.pow(Math.sin(Math.PI * u), 0.9); }

// gefüllte Form mit verjüngten Enden statt Strich mit konstanter Breite
function coreFill(line, eased, baseW, off){
  const N = 16;
  const dx = line.bx - line.ax, dy = line.by - line.ay;
  const lenL = Math.hypot(dx, dy) || 1;
  const nx = -dy / lenL, ny = dx / lenL;
  const ox = line.vertical ? (off || 0) : 0;
  const oy = line.vertical ? 0 : (off || 0);
  ctx.beginPath();
  for (let k = 0; k <= N; k++){
    const u = (k / N) * eased;
    const w = baseW * prof(u) / 2;
    const x = line.ax + dx * u + ox + nx * w;
    const y = line.ay + dy * u + oy + ny * w;
    if (k === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  for (let k = N; k >= 0; k--){
    const u = (k / N) * eased;
    const w = baseW * prof(u) / 2;
    ctx.lineTo(line.ax + dx * u + ox - nx * w, line.ay + dy * u + oy - ny * w);
  }
  ctx.closePath();
  ctx.fill();
}

function shimmerStyle(line, t){
  if (colorId !== 'rainbow') return currentColor().hex;
  const grad = ctx.createLinearGradient(line.ax, line.ay, line.bx, line.by);
  const base = (t * 55) % 360;
  for (let s = 0; s <= 6; s++){
    grad.addColorStop(s / 6, `hsl(${(base + s * 60) % 360} 100% 60%)`);
  }
  return grad;
}

function drawGlow(line, eased, t, i){
  const isWinner = gold && gold.winner === i;
  // ganz leichtes Pulsieren (Gewinner-Line etwas kräftiger);
  // mit Musik-Sync atmet der Glow stattdessen mit dem Bass
  let pulse = isWinner
    ? 0.92 + 0.10 * Math.sin(t * 3)
    : 0.8 + 0.12 * Math.sin(t * 1.8 + i * 0.9);
  let widthBoost = 1;
  if (musicBoost !== null && !isWinner){
    // kräftig mit dem Beat pumpen: Helligkeit UND Breite
    pulse = 0.45 + 0.75 * musicBoost + 0.05 * Math.sin(t * 1.8 + i * 0.9);
    widthBoost = 1 + musicBoost * 0.3;
  }
  const style = isWinner ? goldStyle(line, t) : shimmerStyle(line, t + i * 0.35);

  ctx.save();
  ctx.lineCap = 'round';
  ctx.globalCompositeOperation = 'lighter';
  if (filterOK) ctx.filter = 'blur(3px)';

  // Farbiger Schimmer: viele hauchdünne additive Schichten von breit nach
  // schmal → weicher Verlauf ganz ohne sichtbare Kanten.
  // Doppel-Line: ein gemeinsamer, etwas breiterer Glow um beide Kerne.
  const PASSES = 18;
  const maxW = 64 * line.thick * widthBoost;
  ctx.strokeStyle = style;
  for (let s = 1; s <= PASSES; s++){
    // innere Schichten heller (Kern der Farbe), äußere zart → breiter Halo
    const f = s / PASSES;
    ctx.lineWidth = maxW * f;
    ctx.globalAlpha = pulse * (0.055 + 0.05 * (1 - f));
    linePath(line, eased); ctx.stroke();
  }

  // weißer Schein direkt am Powder-Kern, geht in die Farbe über —
  // gefüllte Form mit Taper (Mitte dicker, Enden schmal)
  const wF = line.isGlitzer ? 1.3 : 1;
  ctx.fillStyle = '#fff';
  for (const wa of [[10, 0.10], [6, 0.14], [3.5, 0.20]]){
    ctx.globalAlpha = wa[1] * pulse * 1.4;
    coreFill(line, eased, wa[0] * line.thick * wF, 0);
  }
  ctx.restore();
}

function drawParticles(line, eased, t){
  for (const p of line.particles){
    if (p.u > eased) break;
    const fresh = eased < 1 && eased - p.u < 0.06;
    const d = (fresh ? p.r * 1.6 : p.r) * 2.6;   // Sprite hat weichen Rand → etwas größer zeichnen
    // Glitzer-Partikel funkeln
    const twinkle = p.tw !== null ? 0.55 + 0.45 * Math.sin(t * 6 + p.tw) : 1;
    ctx.globalAlpha = (fresh ? 1 : p.a) * twinkle;
    ctx.drawImage(p.sprite, p.x - d / 2, p.y - d / 2, d, d);
  }
  ctx.globalAlpha = 1;
}

/* ================= Hintergrund-Ambiente ================= */
function hexA(hex, a){
  return `rgba(${parseInt(hex.slice(1, 3), 16)},${parseInt(hex.slice(3, 5), 16)},${parseInt(hex.slice(5, 7), 16)},${a})`;
}

function drawBg(t){
  if (bgId === 'sterne'){
    ctx.fillStyle = '#fff';
    for (const s of stars){
      ctx.globalAlpha = s.a * (0.55 + 0.45 * Math.sin(t * 1.5 + s.ph));
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
  } else if (bgId === 'nebel'){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let k = 0; k < 3; k++){
      const cx = W * (0.25 + 0.25 * k) + Math.sin(t * 0.13 + k * 2.1) * W * 0.18;
      const cy = H * (0.30 + 0.20 * k) + Math.cos(t * 0.10 + k * 1.7) * H * 0.12;
      const R  = Math.max(W, H) * 0.45;
      const col = colorId === 'rainbow'
        ? `hsla(${(t * 8 + k * 120) % 360} 80% 55% / 0.05)`
        : hexA(currentColor().hex, 0.05);
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, R);
      g.addColorStop(0, col);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }
    ctx.restore();
  }
}

function frame(now){
  if (!overlay.classList.contains('open')) return;
  const t = (now - openT) / 1000;
  musicBoost = analyser ? musicLevel() : null;
  ctx.clearRect(0, 0, W, H);
  drawBg(t);

  let allDone = true;
  for (let i = 0; i < lines.length; i++){
    const p = Math.min(1, Math.max(0, (now - openT - i * STAGGER) / DURATION));
    if (p < 1) allDone = false;
    if (p <= 0) continue;
    const eased = 1 - Math.pow(1 - p, 2.2);
    drawGlow(lines[i], eased, t, i);
    drawParticles(lines[i], eased, t);
  }

  // Goldene Line: springendes Highlight
  if (gold){
    if (gold.winner === null && gold.idx >= 0){
      const l = lines[gold.idx];
      ctx.save();
      ctx.lineCap = 'round';
      ctx.globalCompositeOperation = 'lighter';
      ctx.strokeStyle = '#fff';
      ctx.globalAlpha = 0.5;
      ctx.lineWidth = 16 * l.thick;
      linePath(l, 1); ctx.stroke();
      ctx.restore();
    }
  }

  // Schieber-Wisch: die goldene Klingenkante sitzt bei wipeY, alles darunter
  // ist weggeschoben. Kleiner Überlappungs-Clip → garantiert kein Spalt.
  if (wipeY !== null){
    if (wipeMode === 'complete'){
      // Werkzeug mit konstantem Tempo ganz nach oben aus dem Bild fahren
      // (gleiche Dauer für alle Werkzeuge, unabhängig von der Höhe)
      wipeY -= toolH * 0.035;
      placeTool(wipeY);
      const elemBottom = (wipeY - toolLead) + toolH;   // Unterkante des Werkzeugs
      if (elemBottom < 0 && !wipeFinished){
        wipeFinished = true;
        toolEl.classList.remove('show');
        document.getElementById('spruchEl').classList.add('big');
        showSpruch(SPRUECHE[(Math.random() * SPRUECHE.length) | 0], 2000);
        if (navigator.vibrate) navigator.vibrate(60);
        countTimers.push(setTimeout(closeOverlay, 2400));
      }
    } else if (wipeMode === 'cancel'){
      wipeY += (H + 140 - wipeY) * 0.25;
      placeTool(wipeY);
      if (wipeY > H + 120){
        wipeY = null; wipeMode = null;
        toolEl.classList.remove('show');
      }
    }
    if (wipeY !== null){
      const y = Math.max(0, wipeY + 6);   // 6px unter die Kante → Lines enden verdeckt
      ctx.clearRect(0, y, W, H - y);
    }
  }

  // Gartenzwerg sinkt von oben, sein Strohhalm saugt die Line von oben weg.
  // Die Line endet exakt an der Halm-Spitze (Clip 4px darüber → verdeckt).
  if (helperMode === 'descend'){
    // langsam saugen, solange die Line noch da ist; danach zügig ganz rauslaufen
    const lineBottom = lines[0] ? lines[0].by : H;
    const speed = (gnomeY + GNOME_STRAW_TIP * gnomeH) < lineBottom ? 0.016 : 0.034;
    if (!helperFinished){ gnomeY += H * speed; gnomeEl.style.top = gnomeY + 'px'; }
    const strawTipY = gnomeY + GNOME_STRAW_TIP * gnomeH;
    const clearY = Math.min(H, strawTipY - 4);
    if (clearY > 0) ctx.clearRect(0, 0, W, clearY);
    // Zwerg erst KOMPLETT unten aus dem Bild laufen lassen, DANN der Spruch
    if (gnomeY >= H && !helperFinished){
      helperFinished = true;
      gnomeEl.classList.remove('show');
      document.getElementById('spruchEl').classList.add('big');
      showSpruch(SPRUECHE[(Math.random() * SPRUECHE.length) | 0], 2200);
      if (navigator.vibrate) navigator.vibrate(60);
      helpTimers.push(setTimeout(closeOverlay, 2600));
    }
  }

  if (allDone && !doneFlag){
    doneFlag = true;
    overlay.classList.add('done');
    if (navigator.vibrate) navigator.vibrate(120);
    sPing();
    session.rounds++; saveSession(); renderRounds();
    if (goldOn && lines.length >= 2) document.getElementById('goldBtn').classList.add('show');
    else if (lines.length === 1) document.getElementById('helpBtn').classList.add('show');
    // Wisch-Hinweis kurz zeigen, dann ausblenden
    hintTimer = setTimeout(() => document.getElementById('swipeHint').classList.add('fade'), 2600);
  }
  raf = requestAnimationFrame(frame);  // Schimmer läuft endlos weiter
}

function openOverlay(){
  overlay.classList.add('open');
  overlay.classList.remove('done');
  clearTimeout(hintTimer);
  document.getElementById('swipeHint').classList.remove('fade');
  doneFlag = false;
  gold = null;
  clearTimeout(spruchTimer);
  document.getElementById('spruchEl').classList.remove('show');
  document.getElementById('goldBtn').classList.remove('show');
  resetWipe();
  resetHelper();
  applyTool();   // gewähltes Werkzeug (Grafik + Größe/Rotation) vorbereiten
  audio();   // AudioContext in der User-Geste anlegen/aufwecken (iOS)
  if (navigator.vibrate) navigator.vibrate([60, 40, 60, 40, 180]);

  // fire-and-forget: darf den Animationsstart nie blockieren
  try{ document.documentElement.requestFullscreen?.()?.catch?.(() => {}); }catch{}
  try{ navigator.wakeLock?.request('screen').then(wl => { wakeLock = wl; }).catch(() => {}); }catch{}
  startMusicSync();

  buildLines();

  // Countdown 3-2-1, dann Linien-Start
  const numEl = document.getElementById('countNum');
  countTimers.forEach(clearTimeout); countTimers = [];
  const STEP = 650;
  [3, 2, 1].forEach((num, idx) => {
    countTimers.push(setTimeout(() => {
      numEl.textContent = num;
      numEl.classList.remove('tick'); void numEl.offsetWidth; numEl.classList.add('tick');
      if (navigator.vibrate) navigator.vibrate(30);
      sTick(800 + num * 100);
    }, idx * STEP));
  });
  countTimers.push(setTimeout(() => {
    numEl.textContent = '';
    numEl.classList.remove('tick');
    openT = performance.now();
    sRiser((lines.length - 1) * STAGGER + DURATION);
    raf = requestAnimationFrame(frame);
  }, 3 * STEP));
}

function closeOverlay(){
  if (!overlay.classList.contains('open')) return;
  overlay.classList.remove('open', 'done');
  clearTimeout(hintTimer);
  countTimers.forEach(clearTimeout); countTimers = [];
  document.getElementById('countNum').textContent = '';
  gold = null;
  clearTimeout(spruchTimer);
  document.getElementById('spruchEl').classList.remove('show');
  document.getElementById('goldBtn').classList.remove('show');
  resetWipe();
  resetHelper();
  stopMusicSync();
  if (raf) cancelAnimationFrame(raf);
  raf = null;
  try{ wakeLock?.release(); }catch{}
  wakeLock = null;
  if (document.fullscreenElement) document.exitFullscreen?.().catch(() => {});
}

window.addEventListener('resize', () => {
  if (overlay.classList.contains('open')) buildLines();
});
document.addEventListener('visibilitychange', async () => {
  if (!document.hidden && overlay.classList.contains('open')){
    try{ wakeLock = await navigator.wakeLock?.request('screen'); }catch{}
  }
});

/* ================= Service Worker (Offline) ================= */
if ('serviceWorker' in navigator){
  addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
