<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="rb" gradientUnits="userSpaceOnUse" x1="0" y1="248" x2="0" y2="800">
      <stop offset="0"  stop-color="#FF5E5E"/>
      <stop offset=".2" stop-color="#FFC64D"/>
      <stop offset=".4" stop-color="#D4FF3F"/>
      <stop offset=".6" stop-color="#2EA8FF"/>
      <stop offset=".8" stop-color="#B44DFF"/>
      <stop offset="1"  stop-color="#FF2E9A"/>
